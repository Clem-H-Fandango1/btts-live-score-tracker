<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Alerts</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=notifyclean1">
</head>
<body>
  <div class="container">
    <h1>WhatsApp Alerts</h1>
    <p class="description">Simple controls for BTTS WhatsApp messages.</p>

    <div class="form-row" style="align-items:center;gap:12px;">
      <label for="wa_enabled" style="margin:0;min-width:120px;">Alerts</label>
      <label class="toggle-switch">
        <input type="checkbox" id="wa_enabled">
        <span class="toggle-slider"></span>
      </label>
      <strong id="wa_enabled_text">Loading…</strong>
    </div>

    <div class="form-row" style="margin-top:18px;">
      <label for="wa_target_mode" style="min-width:120px;">Send to</label>
      <select id="wa_target_mode" style="padding:10px 12px;border-radius:8px;min-width:220px;">
        <option value="group">Group</option>
        <option value="me">Martin only</option>
        <option value="both">Both</option>
        <option value="none">Nobody</option>
      </select>
    </div>

    <div class="status-box" style="margin-top:18px;line-height:1.7;">
      <div><strong>Saved status:</strong> <span id="proof_enabled">Loading…</span></div>
      <div><strong>Saved destination:</strong> <span id="proof_target">Loading…</span></div>
      <div><strong>Bridge:</strong> <span id="proof_bridge">Checking…</span></div>
    </div>

    <p class="description" style="margin-top:12px;">Proof shown above is the backend's saved state, not just the switch position.</p>

    <div class="button-row">
      <button id="wa_save_btn">Save</button>
      <button id="wa_refresh_btn">Refresh</button>
      <button id="wa_test_btn">Send test to Martin</button>
    </div>
    <p id="wa_msg" style="display:none;"></p>
  </div>

  <script src="{{ url_for('static', filename='js/notify.js') }}?v=notifyclean1"></script>
</body>
</html>
